{% extends "base.html" %}
{% block title %}预测模型管理{% endblock %}
{% block content %}
<h1>预测模型管理</h1>

<form method="POST" action="/prediction-models/new" class="row g-2 mb-3">
<div class="col-auto"><input name="name" class="form-control" placeholder="模型名称" required></div>
<div class="col-auto"><input name="metric_name" class="form-control" placeholder="指标名" required></div>
<div class="col-auto"><input name="asset_id" class="form-control" type="number" placeholder="资产 ID(可选)" style="width:100px"></div>
<div class="col-auto">
<select name="model_type" class="form-select">
<option value="linear">线性回归</option>
<option value="polynomial">多项式</option>
<option value="rolling_avg">移动平均</option>
</select>
</div>
<div class="col-auto"><input name="params" class="form-control" value='{"window": 20}' placeholder='{"window":20}'></div>
<div class="col-auto"><button type="submit" class="btn btn-primary btn-sm">添加</button></div>
</form>

<div style="display:flex;flex-direction:column;gap:6px">
{% for m in models %}
<div class="card"><div class="card-body" style="display:flex;justify-content:space-between;align-items:center">
<div>
<strong>{{ m.name }}</strong>
<code>{{ m.metric_name }}</code>
<span class="badge">{{ m.model_type }}</span>
<span class="badge {{ 'success' if m.enabled else 'secondary' }}">{{ '启用' if m.enabled else '禁用' }}</span>
{% if m.asset_id %}<span class="text-sm text-muted">资产 #{{ m.asset_id }}</span>{% endif %}
</div>
<div style="display:flex;gap:4px">
<form method="POST" action="/prediction-models/{{ m.id }}/toggle"><button class="btn btn-sm {{ 'btn-warning' if m.enabled else 'btn-success' }}">{{ '禁用' if m.enabled else '启用' }}</button></form>
<form method="POST" action="/prediction-models/{{ m.id }}/delete" onsubmit="return confirm('删除?')"><button class="btn btn-sm btn-danger">删除</button></form>
</div>
</div></div>
{% endfor %}
</div>
{% endblock %}
