{% extends "base.html" %}
{% block title %}指标监控{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
.metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}
.metric-card {
    background: var(--card-bg);
    border: 1px solid rgba(148,163,184,0.12);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
}
.metric-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--primary-light);
    opacity: 0;
    transition: opacity 0.2s;
}
.metric-card:hover { border-color: rgba(148,163,184,0.25); transform: translateY(-1px); }
.metric-card:hover::before { opacity: 1; }
.metric-card .top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.metric-card .icon {
    font-size: 1.2rem;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    background: rgba(129,140,248,0.1);
    flex-shrink: 0;
}
.metric-card .info { flex: 1; min-width: 0; }
.metric-card .name {
    font-size: 0.75rem; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.metric-card .value { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
.metric-card .value.loading { color: var(--text-muted); }
.metric-card .unit { font-size: 0.75rem; color: var(--text-secondary); font-weight: 400; }
.metric-card .chart-wrap { position: relative; width: 100%; height: 130px; }
.metric-card .chart-wrap canvas { width: 100% !important; height: 100% !important; }
.metric-card .no-data { height: 130px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.8rem; }
.metric-card .skeleton { background: linear-gradient(90deg, rgba(148,163,184,0.08) 25%, rgba(148,163,184,0.15) 50%, rgba(148,163,184,0.08) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.cat-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.cat-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(148,163,184,0.2); background: var(--card-bg); color: var(--text-secondary); font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.cat-tab:hover { border-color: var(--primary-light); color: var(--primary-light); background: rgba(129,140,248,0.06); }
.cat-tab.active { border-color: var(--primary); background: var(--primary); color: #fff; }
.cat-tab .cat-count { display: inline-block; margin-left: 4px; font-size: 0.7rem; opacity: 0.7; }
.page-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
.page-header h1 { font-size: 20px; font-weight: 700; color: var(--text-primary); margin: 0; }
.page-header p { font-size: 13px; color: var(--text-muted); margin: 0; }
.toolbar { margin-bottom: 16px; }
.toolbar select { padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(148,163,184,0.2); background: var(--card-bg); color: var(--text-primary); font-size: 13px; min-width: 160px; cursor: pointer; }
</style>
{% endblock %}
{% block content %}
<div class="page-header">
    <h1>指标监控</h1>
    <p>实时指标 · 共 <span id="metricCount">-</span> 个指标</p>
</div>

<div class="toolbar">
    <select name="asset_id" onchange="changeAsset(this.value)">
        <option value="0">全部资产</option>
        {% for asset in assets %}
        <option value="{{ asset.id }}">{{ asset.name }}</option>
        {% endfor %}
    </select>
</div>

<div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" data-cat="all" onclick="filterCategory('all')">全部 <span class="cat-count" id="countAll">-</span></button>
</div>

<div class="metric-grid" id="metricGrid">
    <div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-muted);">
        <div style="font-size:32px;margin-bottom:8px;">⏳</div>
        <div>正在加载指标数据...</div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const colorPalette = ['#818cf8','#6366f1','#a5b4fc','#4f46e5','#c4b5fd','#8b5cf6','#a78bfa','#7c3aed','#f97316','#ef4444','#10b981','#f59e0b'];
const CATEGORIES = [
    {key: "cpu", label: "CPU / 负载", icon: "⚡"}, {key: "memory", label: "内存", icon: "🧠"},
    {key: "disk", label: "磁盘", icon: "💿"}, {key: "network", label: "网络", icon: "📥"},
    {key: "system", label: "系统", icon: "⚙️"}, {key: "connection", label: "应用连接", icon: "🔌"},
    {key: "docker", label: "Docker", icon: "🐳"}, {key: "k8s", label: "Kubernetes", icon: "☸️"},
];
let charts = {};
let allMetrics = [];
let latestValues = {};

function getAssetId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('asset_id') || '0';
}

function getIcon(name) {
    for (const c of CATEGORIES) {
        const patterns = {cpu: /cpu|loadavg|uptime/i, memory: /memory|swap/i, disk: /^disk/i, network: /net_|network|tcp_/i, system: /process_|zombie|open_files|uptime/i, connection: /ssh_conn|http_conn|mysql_conn|_connections/i, docker: /docker/i, k8s: /deployment|node_|pod_/i};
        if (patterns[c.key] && patterns[c.key].test(name)) return {icon: c.icon, key: c.key, label: c.label};
    }
    return {icon: '📊', key: 'other', label: '其他'};
}

async function loadMetrics() {
    const assetId = getAssetId();
    const grid = document.getElementById('metricGrid');
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-muted);"><div style="font-size:32px;margin-bottom:8px;">⏳</div><div>正在加载指标数据...</div></div>';

    try {
        const [namesRes, latestRes] = await Promise.all([
            fetch('/metrics/names'),
            fetch('/metrics/latest?asset_id=' + assetId)
        ]);
        const names = await namesRes.json();
        latestValues = await latestRes.json();
        allMetrics = names;

        document.getElementById('metricCount').textContent = names.length;
        document.getElementById('countAll').textContent = names.length;

        // Build category tabs
        const catTabs = document.getElementById('catTabs');
        catTabs.innerHTML = '<button class="cat-tab active" data-cat="all" onclick="filterCategory(\'all\')">全部 <span class="cat-count">' + names.length + '</span></button>';
        const catCounts = {};
        for (const n of names) {
            const {key} = getIcon(n);
            catCounts[key] = (catCounts[key] || 0) + 1;
        }
        for (const c of CATEGORIES) {
            if (catCounts[c.key]) {
                catTabs.innerHTML += '<button class="cat-tab" data-cat="' + c.key + '" onclick="filterCategory(\'' + c.key + '\')">' + c.icon + ' ' + c.label + ' <span class="cat-count">' + catCounts[c.key] + '</span></button>';
            }
        }

        // Build metric cards grid
        grid.innerHTML = '';
        for (const name of names) {
            const {icon, key, label} = getIcon(name);
            const lv = latestValues[name];
            const val = lv ? lv.value : null;
            const unit = lv ? lv.unit : '';
            const hasChart = lv && lv.value !== null;
            const card = document.createElement('div');
            card.className = 'metric-card';
            card.dataset.cat = key;
            card.innerHTML =
                '<div class="top">' +
                    '<div class="icon">' + icon + '</div>' +
                    '<div class="info">' +
                        '<div class="name" title="' + name + '">' + name + '</div>' +
                        '<div class="value ' + (val === null ? 'loading' : '') + '" id="val_' + name.replace(/[^a-zA-Z0-9]/g, '_') + '">' +
                            (val !== null ? val.toFixed(1) : '加载中') +
                            (unit ? ' <span class="unit">' + unit + '</span>' : '') +
                        '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="chart-wrap"><canvas data-metric="' + name + '"></canvas></div>';
            grid.appendChild(card);
        }

        // Load chart data
        loadChartData();
    } catch(e) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:#ef4444;"><div style="font-size:32px;margin-bottom:8px;">❌</div><div>加载失败: ' + e.message + '</div></div>';
    }
}

async function loadChartData() {
    const assetId = getAssetId();
    try {
        const res = await fetch('/metrics/data?asset_id=' + assetId + '&hours=1');
        const allData = await res.json();
        const grouped = {};
        allData.forEach(d => { if (!grouped[d.name]) grouped[d.name] = []; grouped[d.name].push(d); });
        Object.keys(grouped).forEach(name => {
            const canvas = document.querySelector('canvas[data-metric="' + name + '"]');
            if (!canvas) return;
            const data = grouped[name];
            if (charts[name]) { charts[name].destroy(); delete charts[name]; }
            if (data.length < 2) return;
            charts[name] = buildChart(canvas, data);
        });
    } catch(e) { console.error('chart data error:', e); }
}

function buildChart(canvas, data) {
    const ctx = canvas.getContext('2d');
    const labels = data.map(d => new Date(d.time).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}));
    const uniqueAssets = [...new Set(data.map(d => d.asset_id))];
    const datasets = uniqueAssets.map((aid, i) => {
        const pts = data.filter(d => d.asset_id === aid);
        return {
            label: '资产 ' + aid,
            data: pts.map(d => d.value),
            borderColor: colorPalette[i % colorPalette.length],
            backgroundColor: colorPalette[i % colorPalette.length] + '15',
            borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 3,
            fill: true, tension: 0.3,
        };
    });
    return new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: uniqueAssets.length > 1, position: 'top', labels: { boxWidth: 10, padding: 6, font: { size: 9 }, color: '#94a3b8' } },
                tooltip: { backgroundColor: '#fff', titleColor: '#1e293b', bodyColor: '#64748b', borderColor: 'rgba(148,163,184,0.2)', borderWidth: 1, padding: 8, cornerRadius: 6, bodyFont: { size: 11 }, titleFont: { size: 11 } }
            },
            scales: {
                x: { display: true, grid: { display: false }, ticks: { color: '#94a3b8', maxTicksLimit: 5, font: { size: 9 } } },
                y: { display: true, beginAtZero: false, grid: { color: 'rgba(0,0,0,0.04)', drawBorder: false }, ticks: { color: '#94a3b8', font: { size: 9 }, maxTicksLimit: 4 } }
            },
            elements: { point: { radius: 0 } }
        }
    });
}

function filterCategory(cat) {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
    document.querySelectorAll('.metric-card').forEach(c => {
        c.style.display = (cat === 'all' || c.dataset.cat === cat) ? '' : 'none';
    });
}

function changeAsset(assetId) {
    const url = new URL(window.location);
    if (assetId === '0') url.searchParams.delete('asset_id');
    else url.searchParams.set('asset_id', assetId);
    window.location.href = url.toString();
}

// Init
document.addEventListener('DOMContentLoaded', () => {
    loadMetrics();
    setInterval(loadChartData, 15000);
});
</script>
{% endblock %}
