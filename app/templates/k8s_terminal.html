{% extends "base.html" %}
{% block title %}终端 - {{ pod }}{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/css/xterm.min.css">
{% endblock %}
{% block content %}
<div class="page-header">
    <h1>终端: {{ pod }}</h1>
    <span style="color:#64748b;font-size:0.85rem">{{ cluster }} / {{ namespace }}</span>
</div>

<div id="terminal" style="height:70vh;background:#1e1e1e;border-radius:6px;overflow:hidden"></div>

<script src="/static/js/xterm.min.js"></script>
<script src="/static/js/xterm-addon-fit.min.js"></script>
<script>
var term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'Cascadia Code','Fira Code',monospace",
    theme: { background: '#0d1117', foreground: '#e6edf3', cursor: '#e6edf3', selection: '#3b5998' },
});
var fitAddon = new FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));
fitAddon.fit();

var protocol = location.protocol === 'https:' ? 'wss://' : 'ws://';
var _token = localStorage.getItem('aiops-token') || '';
var _wsUrl = protocol + location.host + '/k8s/ws/pod/{{ cluster }}/{{ namespace }}/{{ pod }}/terminal';
var ws = new WebSocket(_token ? _wsUrl + '?token=' + encodeURIComponent(_token) : _wsUrl);

ws.onopen = function() { term.focus(); };
ws.onmessage = function(e) { term.write(e.data); };
ws.onerror = function() { term.write('\r\n[连接错误]\r\n'); };
ws.onclose = function() { term.write('\r\n[连接关闭]\r\n'); };

term.onData(function(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(data);
    }
});

window.addEventListener('resize', function() {
    fitAddon.fit();
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({resize: {cols: term.cols, rows: term.rows}}));
    }
});
</script>
{% endblock %}
