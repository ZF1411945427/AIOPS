{% extends "base.html" %}
{% block content %}
<h2>用户管理</h2>

<div class="row mb-3">
<div class="col-md-12">
<button class="btn btn-primary" onclick="toggleUserForm()">添加用户</button>
</div>
</div>

<div class="mb-3" id="addUserForm" style="display:none">
<div class="card card-body">
<form method="POST" action="/users/create" class="row g-3">
<div class="col-md-4">
<label class="form-label">用户名</label>
<input name="username" class="form-control" required>
</div>
<div class="col-md-4">
<label class="form-label">密码</label>
<input name="password" type="password" class="form-control" required>
</div>
<div class="col-md-2">
<label class="form-label">角色</label>
<select name="role" class="form-select">
<option value="admin">管理员</option>
<option value="operator" selected>运维人员</option>
<option value="viewer">只读用户</option>
</select>
</div>
<div class="col-md-2 align-self-end">
<button type="submit" class="btn btn-success">添加</button>
</div>
</form>
</div>
</div>

<table class="table table-sm">
<thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>操作</th></tr></thead>
<tbody>
{% for u in users %}
<tr>
<td>{{ u.id }}</td>
<td>{{ u.username }}</td>
<td>{% if u.role == "admin" %}管理员{% elif u.role == "operator" %}运维人员{% else %}只读用户{% endif %}</td>
<td>
{% if u.id != request.session.user_id %}
<form method="POST" action="/users/{{ u.id }}/delete" style="display:inline">
<button class="btn btn-sm btn-danger" onclick="return confirm('确定删除用户 {{ u.username }}？')">删除</button>
</form>
{% else %}
<span class="text-muted">当前用户</span>
{% endif %}
</td>
</tr>
{% endfor %}
</tbody>
</table>
<script>
function toggleUserForm() {
  var el = document.getElementById('addUserForm');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
</script>
{% endblock %}
