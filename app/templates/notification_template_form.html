{% extends "base.html" %}
{% block title %}新建通知模板{% endblock %}
{% block content %}
<div class="page-header">
    <h1>新建通知模板</h1>
    <a href="/notification-templates" class="link">← 返回</a>
</div>

<form method="POST" action="/notification-templates/new" style="max-width:600px">
    <div class="mb-2">
        <label>模板名称</label>
        <input name="name" class="form-control" required>
    </div>
    <div class="mb-2">
        <label>渠道类型（留空=通用）</label>
        <input name="channel_type" class="form-control" placeholder="dingtalk, wecom, email, webhook">
    </div>
    <div class="mb-2">
        <label>消息标题模板</label>
        <input name="title_template" class="form-control" value="[{{ "{{ alert.severity }}" }}] {{ "{{ alert.metric_name }}" }}">
    </div>
    <div class="mb-2">
        <label>消息内容模板</label>
        <textarea name="body_template" rows="6" class="form-control" style="font-family:monospace;font-size:12px">告警: {{ "{{ alert.metric_name }}" }}
级别: {{ "{{ alert.severity }}" }}
当前值: {{ "{{ alert.actual_value }}" }} (阈值: {{ "{{ alert.threshold }}" }})
消息: {{ "{{ alert.message }}" }}
时间: {{ "{{ alert.created_at }}" }}</textarea>
    </div>
    <div class="mb-2">
        <label>最低告警级别</label>
        <select name="severity" class="form-select">
            <option value="info">Info</option>
            <option value="warning" selected>Warning</option>
            <option value="critical">Critical</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">创建</button>
</form>
{% endblock %}
