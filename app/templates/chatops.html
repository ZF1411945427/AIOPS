{% extends "base.html" %}
{% block title %}ChatOps 指令{% endblock %}
{% block content %}
<h1>ChatOps 指令</h1>
<p class="text-sm text-muted">输入命令执行运维操作，支持 /alerts /alert /assets /change /report /pods /help</p>

<div id="chat-box" style="border:1px solid var(--border);border-radius:6px;height:400px;overflow-y:auto;padding:12px;margin-bottom:8px;background:var(--bg-secondary)">
<div class="chat-msg system" style="margin-bottom:6px;color:var(--text-muted)">已连接，输入 /help 查看帮助</div>
</div>

<form id="chat-form" class="row g-2">
<div class="col"><input id="chat-input" class="form-control" placeholder="输入命令..." autofocus></div>
<div class="col-auto"><button type="submit" class="btn btn-primary">发送</button></div>
</form>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('chat-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var input = document.getElementById('chat-input');
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    var box = document.getElementById('chat-box');
    box.innerHTML += '<div class="chat-msg user" style="margin-bottom:4px;color:var(--accent)"><strong>你:</strong> ' + escapeHtml(text) + '</div>';
    fetch('/chatops/command', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'text=' + encodeURIComponent(text)
    }).then(function(r){ return r.json(); }).then(function(d) {
        box.innerHTML += '<div class="chat-msg bot" style="margin-bottom:6px;white-space:pre-wrap;color:var(--text)"><strong>🤖:</strong> ' + escapeHtml(d.reply) + '</div>';
        box.scrollTop = box.scrollHeight;
    });
});
function escapeHtml(s) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(s));
    return div.innerHTML;
}
</script>
{% endblock %}
