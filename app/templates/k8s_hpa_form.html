{% extends "base.html" %}
{% block content %}
<h2>{{ '编辑' if hpa else '新建' }} HPA</h2>
<a href="/k8s/hpas?cluster={{ cluster }}&namespace={{ namespace }}" class="link">← 返回</a>

{% if cluster_info %}
<div class="cluster-info-bar" style="display:flex;gap:12px;align-items:center;margin-bottom:16px;padding:12px 16px;border-radius:10px;background:rgba(129,140,248,0.06);border:1px solid rgba(129,140,248,0.12);">
  <span style="font-weight:600;color:var(--primary-light,#818cf8);">当前集群:</span>
  <span style="font-weight:600;">{{ cluster_info.name }}</span>
  <span class="badge" style="background:{{ 'rgba(16,185,129,0.15);color:#10b981' if cluster_info.status == 'online' else 'rgba(239,68,68,0.15);color:#ef4444' }};padding:2px 10px;border-radius:20px;font-size:12px;">{{ cluster_info.status or '未知' }}</span>
  <span style="color:var(--text-muted,#94a3b8);font-size:13px;">{{ cluster_info.endpoint or '' }}</span>
</div>
{% endif %}

<form method="POST" action="{{ '/k8s/hpas/update' if hpa else '/k8s/hpas/create' }}" class="card card-body mt-2" style="max-width:600px">
    <div class="mb-2">
        <label>集群</label>
        <select name="cluster" class="form-select" required>
            {% for c in clusters %}
            <option value="{{ c.name }}" {{ 'selected' if cluster == c.name }}>{{ c.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-2">
        <label>命名空间</label>
        <input name="namespace" class="form-control" value="{{ namespace or 'default' }}" required>
    </div>
    <div class="mb-2">
        <label>HPA 名称</label>
        <input name="name" class="form-control" value="{{ hpa.name if hpa else '' }}" {{ 'readonly' if hpa }} required>
    </div>
    <div class="mb-2">
        <label>目标资源类型</label>
        <select name="target_kind" class="form-select">
            <option value="Deployment">Deployment</option>
            <option value="StatefulSet">StatefulSet</option>
        </select>
    </div>
    <div class="mb-2">
        <label>目标资源名称</label>
        <input name="target_name" class="form-control" value="{{ hpa.target_name if hpa else '' }}" required>
    </div>
    <div class="row" style="display:flex;gap:12px">
        <div class="mb-2" style="flex:1">
            <label>最小副本数</label>
            <input name="min_replicas" type="number" class="form-control" value="{{ hpa.min_replicas if hpa else 1 }}" min="1">
        </div>
        <div class="mb-2" style="flex:1">
            <label>最大副本数</label>
            <input name="max_replicas" type="number" class="form-control" value="{{ hpa.max_replicas if hpa else 3 }}" min="1">
        </div>
        <div class="mb-2" style="flex:1">
            <label>CPU 目标 (%)</label>
            <input name="cpu_target" type="number" class="form-control" value="{{ hpa.cpu_target if hpa else 80 }}" min="1" max="100">
        </div>
    </div>
    <div>
        <button type="submit" class="btn btn-primary">保存</button>
    </div>
</form>
{% endblock %}
