{% extends "base.html" %}
{% block title %}新建自愈工作流{% endblock %}
{% block content %}
<div class="page-header">
    <h1>新建自愈工作流</h1>
    <a href="/remediation-workflows" class="link">← 返回</a>
</div>

<form method="POST" action="/remediation-workflows/new" style="max-width:700px">
    <div class="mb-2">
        <label>名称</label>
        <input name="name" class="form-control" required>
    </div>
    <div class="mb-2">
        <label>关联告警规则 ID（可选）</label>
        <input name="rule_id" type="number" class="form-control" placeholder="留空则匹配所有告警">
    </div>
    <div class="mb-2">
        <label>步骤定义 (JSON 数组)</label>
        <textarea name="steps" rows="8" class="form-control" style="font-family:monospace;font-size:12px">[
  {"action": "healthcheck", "params": {}},
  {"action": "restart", "params": {}},
  {"action": "healthcheck", "params": {}},
  {"action": "notify", "params": {}}
]</textarea>
        <div class="text-sm" style="color:#888;margin-top:4px">可用操作: restart, clean, scale, notify, healthcheck</div>
    </div>
    <button type="submit" class="btn btn-primary">创建</button>
</form>
{% endblock %}
