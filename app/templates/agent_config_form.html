{% extends "base.html" %}
{% block content %}
<div class="workbench-page-shell">
  <div class="section-toolbar">
    <h1>{{ "编辑" if config else "创建" }} Agent 配置</h1>
  </div>

  <div class="panel fade-in">
    <div class="panel-body">
      <form method="post" class="form">
        <div class="form-group">
          <label>配置名称</label>
          <input name="name" value="{{ config.name if config else 'default' }}" required>
        </div>
        <div class="form-group">
          <label>默认模型提供商</label>
          <select name="default_provider_id">
            <option value="0">-- 未设置 --</option>
            {% for p in providers %}
            <option value="{{ p.id }}" {% if config and config.default_provider_id == p.id %}selected{% endif %}>
              {{ p.name }} ({{ p.default_model }})
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>系统提示词</label>
          <textarea name="system_prompt" rows="6" style="font-family:var(--font-mono);">{{ config.system_prompt if config else '' }}</textarea>
        </div>
        <div class="form-group">
          <label>欢迎语</label>
          <input name="welcome_message"
                 value="{{ config.welcome_message if config else '你好，我可以帮你查询资源、分析告警、生成运维任务等。' }}">
        </div>
        <div class="form-group">
          <label>建议问题 (JSON 数组)</label>
          <textarea name="suggested_questions" rows="3" style="font-family:var(--font-mono);">{{ config.suggested_questions if config else '[]' }}</textarea>
        </div>
        <div class="form-inline" style="gap:20px">
          <label class="d-flex align-center gap-2" style="cursor:pointer">
            <input type="checkbox" name="allow_action_execution"
                   {% if config and config.allow_action_execution %}checked{% endif %}>
            <span style="font-size:0.85rem">允许生成待执行任务</span>
          </label>
          <label class="d-flex align-center gap-2" style="cursor:pointer">
            <input type="checkbox" name="require_confirmation"
                   {% if not config or config.require_confirmation %}checked{% endif %}>
            <span style="font-size:0.85rem">需要用户确认后才执行</span>
          </label>
        </div>
        <div class="form-group" style="max-width:120px">
          <label>最大历史消息数</label>
          <input name="max_history_messages" type="number" value="{{ config.max_history_messages if config else 12 }}">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">保存</button>
          <a href="/ai/providers" class="btn">取消</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
