{% extends "base.html" %}
{% block title %}{{'编辑' if model else '新建'}CI 类型{% endblock %}
{% block content %}
<h1>{{ '编辑' if model else '新建'}CI 类型</h1>
<form method="POST" action="/ci-models/new" class="row g-3">
<div class="col-6"><label>标识名</label><input name="name" class="form-control" required placeholder="如 server, pod, deployment"></div>
<div class="col-6"><label>显示名</label><input name="display_name" class="form-control" placeholder="如 物理服务器, Pod"></div>
<div class="col-12"><label>描述</label><textarea name="description" class="form-control" rows="2"></textarea></div>
<div class="col-4"><label>父类型</label><input name="parent_type" class="form-control" placeholder="可选"></div>
<div class="col-4"><label>图标</label><input name="icon" class="form-control" placeholder="如 server, container"></div>
<div class="col-12"><button type="submit" class="btn btn-primary">创建</button></div>
</form>
{% endblock %}
