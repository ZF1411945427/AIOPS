{% extends "base.html" %}
{% block title %}新建日志异常规则{% endblock %}
{% block content %}
<div class="page-header">
    <h1>新建日志异常规则</h1>
    <a href="/log-anomaly" class="link">← 返回</a>
</div>

<form method="POST" action="/log-anomaly/new" style="max-width:500px">
    <div class="mb-2">
        <label>规则名称</label>
        <input name="name" class="form-control" required>
    </div>
    <div class="mb-2">
        <label>日志来源</label>
        <select name="source" class="form-select">
            <option value="k8s">K8s Events</option>
            <option value="metric">指标记录</option>
        </select>
    </div>
    <div class="mb-2">
        <label>关键字匹配</label>
        <input name="keyword" class="form-control" placeholder="如: OOM, error, timeout">
    </div>
    <div class="mb-2">
        <label>正则表达式（可选，优先级高于关键字）</label>
        <input name="regex_pattern" class="form-control" placeholder="如: .*error.*">
    </div>
    <div class="row" style="display:flex;gap:12px">
        <div class="mb-2" style="flex:1">
            <label>触发阈值</label>
            <input name="threshold" type="number" class="form-control" value="10">
        </div>
        <div class="mb-2" style="flex:1">
            <label>时间窗口（分钟）</label>
            <input name="window_minutes" type="number" class="form-control" value="5">
        </div>
        <div class="mb-2" style="flex:1">
            <label>告警级别</label>
            <select name="severity" class="form-select">
                <option value="info">Info</option>
                <option value="warning" selected>Warning</option>
                <option value="critical">Critical</option>
            </select>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">创建</button>
</form>
{% endblock %}
