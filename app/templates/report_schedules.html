{% extends "base.html" %}
{% block title %}定时报告{% endblock %}
{% block content %}
<h1>定时报告</h1>

<form method="POST" action="/report-schedules/new" class="row g-2 mb-3">
<div class="col-auto"><input name="name" class="form-control" placeholder="名称" required></div>
<div class="col-auto">
<select name="report_type" class="form-select">
<option value="daily">日报</option>
<option value="weekly">周报</option>
<option value="monthly">月报</option>
</select>
</div>
<div class="col-auto"><input name="cron_expr" class="form-control" value="0 8 * * *" placeholder="Cron"></div>
<div class="col-auto">
<select name="channel" class="form-select">
<option value="email">邮件</option>
<option value="log">日志</option>
</select>
</div>
<div class="col-auto"><input name="channel_config" class="form-control" value='{"to": "admin@example.com"}' placeholder='{"to":"..."}'></div>
<div class="col-auto"><button type="submit" class="btn btn-primary btn-sm">添加</button></div>
</form>

<div style="display:flex;flex-direction:column;gap:6px">
{% for s in schedules %}
<div class="card"><div class="card-body" style="display:flex;justify-content:space-between;align-items:center">
<div>
<strong>{{ s.name }}</strong>
<span class="badge">{{ s.report_type }}</span>
<code class="text-sm">{{ s.cron_expr }}</code>
<span class="badge {{ 'success' if s.enabled else 'secondary' }}">{{ '启用' if s.enabled else '禁用' }}</span>
<span class="text-sm text-muted">{{ s.channel }}</span>
</div>
<div style="display:flex;gap:4px">
<form method="POST" action="/report-schedules/{{ s.id }}/toggle"><button class="btn btn-sm {{ 'btn-warning' if s.enabled else 'btn-success' }}">{{ '禁用' if s.enabled else '启用' }}</button></form>
<form method="POST" action="/report-schedules/{{ s.id }}/delete" onsubmit="return confirm('确定删除?')"><button class="btn btn-sm btn-danger">删除</button></form>
</div>
</div></div>
{% endfor %}
</div>
{% endblock %}
