<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOPS - 智能运维系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=8">
    <style>
        .login-body { background: var(--bg-primary); }
        .login-box {
            --bg-card: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        html.dark .login-box {
            --bg-card: rgba(30, 35, 48, 0.7);
        }
    </style>
</head>
<body class="login-body">
    <div class="login-particles" id="particles"></div>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h1>AIOPS</h1>
                <p>智能运维系统 v0.1.0</p>
            </div>
            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}
            <form method="post" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required placeholder="admin" autofocus>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="admin123">
                </div>
                <button type="submit" class="btn btn-primary btn-block">登 录</button>
            </form>
            <div style="text-align:center;margin-top:16px;">
                <a href="/product" style="color:var(--text-secondary);font-size:13px;text-decoration:none;">了解产品 →</a>
            </div>
        </div>
    </div>
    <script src="/static/js/app.js?v=2"></script>
    <script>
        Theme.init();
        // Generate floating particles
        var container = document.getElementById('particles');
        for (var i = 0; i < 20; i++) {
            var p = document.createElement('div');
            p.className = 'login-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = (Math.random() * 12) + 's';
            p.style.animationDuration = (10 + Math.random() * 10) + 's';
            p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
            container.appendChild(p);
        }
    </script>
</body>
</html>
