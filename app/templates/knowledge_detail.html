{% extends "base.html" %}
{% block content %}
<h2>{{ item.title }}</h2>
<p class="text-muted">级别: {{ item.severity }} | 标签: {{ item.tags or '-' }} | 资产类型: {{ item.asset_type or '-' }}</p>

<form method="POST" action="/knowledge/{{ item.id }}/update">
<div class="row g-3">
<div class="col-12">
<label class="form-label">标题</label>
<input name="title" value="{{ item.title }}" class="form-control" required>
</div>
<div class="col-6">
<label class="form-label">症状描述</label>
<textarea name="symptom" class="form-control" rows="4">{{ item.symptom }}</textarea>
</div>
<div class="col-6">
<label class="form-label">根因分析</label>
<textarea name="root_cause" class="form-control" rows="4">{{ item.root_cause }}</textarea>
</div>
<div class="col-12">
<label class="form-label">解决方案</label>
<textarea name="solution" class="form-control" rows="4">{{ item.solution }}</textarea>
</div>
<div class="col-4">
<label class="form-label">级别</label>
<select name="severity" class="form-select">
<option value="info" {% if item.severity == 'info' %}selected{% endif %}>Info</option>
<option value="warning" {% if item.severity == 'warning' %}selected{% endif %}>Warning</option>
<option value="critical" {% if item.severity == 'critical' %}selected{% endif %}>Critical</option>
</select>
</div>
<div class="col-4">
<label class="form-label">资产类型</label>
<input name="asset_type" value="{{ item.asset_type }}" class="form-control">
</div>
<div class="col-4">
<label class="form-label">标签</label>
<input name="tags" value="{{ item.tags }}" class="form-control">
</div>
<div class="col-12">
<button type="submit" class="btn btn-primary">更新</button>
<a href="/knowledge" class="btn btn-secondary">返回列表</a>
</div>
</div>
</form>
{% endblock %}
