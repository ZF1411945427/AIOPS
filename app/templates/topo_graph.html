{% extends "base.html" %}
{% block title %}拓扑图可视化{% endblock %}
{% block content %}
<h1>拓扑图可视化</h1>
<p class="text-sm text-muted">力导向图展示资产依赖关系（红色节点表示有未处理告警）</p>
<div id="topo-container" style="border:1px solid var(--border);border-radius:6px;width:100%;height:600px;overflow:hidden;background:var(--bg-secondary)"></div>
{% endblock %}

{% block scripts %}
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
fetch('/topo-graph/data').then(function(r){ return r.json(); }).then(function(data){
    var w = document.getElementById('topo-container').clientWidth;
    var h = 600;
    var svg = d3.select('#topo-container').append('svg').attr('width', w).attr('height', h);
    var g = svg.append('g');
    var zoom = d3.zoom().scaleExtent([0.1,4]).on('zoom', function(e){ g.attr('transform', e.transform); });
    svg.call(zoom);

    var sim = d3.forceSimulation(data.nodes)
        .force('link', d3.forceLink(data.links).id(function(d){ return d.id; }).distance(80))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(w/2, h/2))
        .force('collision', d3.forceCollide(30));

    var link = g.selectAll('line').data(data.links).enter().append('line')
        .attr('stroke', '#555').attr('stroke-width', 1.5).attr('stroke-opacity', 0.6);

    var node = g.selectAll('circle').data(data.nodes).enter().append('circle')
        .attr('r', 10).attr('fill', function(d){ return d.color; })
        .attr('stroke', '#fff').attr('stroke-width', 1.5)
        .call(d3.drag()
            .on('start', function(e,d){ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on('drag', function(e,d){ d.fx = e.x; d.fy = e.y; })
            .on('end', function(e,d){ if(!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
        );

    var label = g.selectAll('text').data(data.nodes).enter().append('text')
        .text(function(d){ return d.name; }).attr('font-size', 11).attr('dx', 14).attr('dy', 4)
        .attr('fill', '#ccc').attr('pointer-events', 'none');

    var tip = g.selectAll('title').data(data.nodes).enter().append('title')
        .text(function(d){ return d.name + ' (' + d.type + ') [' + d.status + ']'; });

    node.on('mouseover', function(e,d){
        d3.select(this).attr('r', 14);
    }).on('mouseout', function(e,d){
        d3.select(this).attr('r', 10);
    }).on('click', function(e,d){
        window.open('/assets/' + d.id, '_blank');
    });

    sim.on('tick', function(){
        link.attr('x1', function(d){ return d.source.x; }).attr('y1', function(d){ return d.source.y; })
            .attr('x2', function(d){ return d.target.x; }).attr('y2', function(d){ return d.target.y; });
        node.attr('cx', function(d){ return d.x; }).attr('cy', function(d){ return d.y; });
        label.attr('x', function(d){ return d.x; }).attr('y', function(d){ return d.y; });
    });
});
</script>
{% endblock %}
