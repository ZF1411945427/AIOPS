{% extends "base.html" %}
{% block title %}{{'编辑' if change else '新建'}变更{% endblock %}
{% block content %}
<h1>{{ '编辑' if change else '新建'}变更</h1>
<form method="POST" action="/change-workflow/new">
<div class="row g-3">
<div class="col-12"><label>标题</label><input name="title" class="form-control" required></div>
<div class="col-12"><label>描述</label><textarea name="description" class="form-control" rows="3"></textarea></div>
<div class="col-4"><label>CI 类型</label>
<select name="ci_type" class="form-select">
<option value="">--</option>
<option>server</option><option>vm</option><option>pod</option><option>deployment</option><option>service</option><option>configmap</option>
</select></div>
<div class="col-4"><label>变更类型</label>
<select name="change_type" class="form-select">
<option value="standard">标准变更</option>
<option value="normal" selected>普通变更</option>
<option value="emergency">紧急变更</option>
</select></div>
<div class="col-4"><label>优先级</label>
<select name="priority" class="form-select">
<option value="low">低</option>
<option value="medium" selected>中</option>
<option value="high">高</option>
<option value="critical">紧急</option>
</select></div>
<div class="col-4"><label>风险等级</label>
<select name="risk_level" class="form-select">
<option value="low" selected>低</option>
<option value="medium">中</option>
<option value="high">高</option>
</select></div>
<div class="col-4"><label>计划开始</label><input name="planned_start" class="form-control" type="datetime-local"></div>
<div class="col-4"><label>计划结束</label><input name="planned_end" class="form-control" type="datetime-local"></div>
<div class="col-12"><button type="submit" class="btn btn-primary">提交</button></div>
</div>
</form>
{% endblock %}
